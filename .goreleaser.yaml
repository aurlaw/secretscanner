version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: secretscanner
    main: ./cmd/secretscanner
    binary: secretscanner
    ldflags:
      - -s -w
      - -X github.com/aurlaw/secretscanner/internal/version.Version={{.Version}}
      - -X github.com/aurlaw/secretscanner/internal/version.Commit={{.Commit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: secretscanner
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: aurlaw
    name: secretscanner
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
